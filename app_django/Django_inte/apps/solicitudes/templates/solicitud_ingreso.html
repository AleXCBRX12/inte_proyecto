{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Solicitud de Incubación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0d6efd, #ffffff);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
            display: flex;
            justify-content: center;
            padding: 40px 15px;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            max-width: 1000px;
            width: 100%;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(13, 110, 253, 0.3);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(13, 110, 253, 0.5);
        }

        .card-header {
            background: linear-gradient(90deg, #0d6efd, #4da3ff);
            color: white;
            border-radius: 18px 18px 0 0;
            text-align: center;
        }

        h5 {
            color: #0d6efd;
            margin-top: 30px;
        }

        input, textarea, select {
            border-radius: 10px !important;
            transition: box-shadow 0.3s ease;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border: 2px solid #0d6efd;
            box-shadow: 0 0 12px rgba(13, 110, 253, 0.6);
        }

        .btn-primary {
            background: linear-gradient(90deg, #0d6efd, #4da3ff);
            border: none;
            padding: 12px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::after {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, rgba(255,255,255,0.4), rgba(255,255,255,0));
            animation: shine 2s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            50% { left: 100%; }
            100% { left: 100%; }
        }
    </style>
</head>

<body>

<div class="card shadow-lg">
    <div class="card-header p-4">
        <h3>Solicitud de Ingreso a la Incubadora</h3>
        <p class="mb-0">Formato de evaluación de emprendimientos</p>
    </div>

    <div class="card-body p-4">
        <form id="solicitudForm">
            {% csrf_token %}

            <h5>Información Personal</h5>

            <input class="form-control mb-3" name="nombre_completo" placeholder="Nombre completo" required>
            <input
                class="form-control mb-3"
                type="email"
                name="correo"
                placeholder="Correo electrónico"
                required
            >

            <div class="row">
                <div class="col-md-3 mb-3">
                    <input class="form-control" type="number" name="edad" placeholder="Edad">
                </div>
                <div class="col-md-5 mb-3">
                    <input class="form-control" name="carrera" placeholder="Carrera">
                </div>
                <div class="col-md-4 mb-3">
                    <input class="form-control" name="nivel" placeholder="Nivel">
                </div>
            </div>

            <input class="form-control mb-3" name="matricula" placeholder="Matrícula">
            <input class="form-control mb-3" name="asesor_academico" placeholder="Asesor académico">
            <input class="form-control mb-3" name="tutor" placeholder="Tutor">
            <input class="form-control mb-3" name="telefono" placeholder="Número telefónico">
            <input class="form-control mb-3" name="direccion" placeholder="Dirección">
            <input class="form-control mb-3" type="number" name="integrantes_equipo" placeholder="Número de integrantes en el equipo">

            <h5>Información Básica del Emprendimiento</h5>

            <textarea class="form-control mb-3" name="descripcion_negocio" placeholder="Breve descripción de tu idea de negocio"></textarea>

            <input class="form-control mb-3" name="ubicacion_emprendimiento" placeholder="¿Dónde se encuentra o te gustaría establecerte?">
            <input class="form-control mb-3" name="inicio_emprendimiento" placeholder="¿Cuándo comenzó tu emprendimiento?">

            <input class="form-control mb-3" name="clientes_clave" placeholder="¿Quiénes son tus clientes o usuarios clave?">

            <textarea class="form-control mb-3" name="problema_resuelve" placeholder="¿Qué problema resuelven? ¿Es global o local?"></textarea>

            <input class="form-control mb-3" name="producto_servicio" placeholder="Producto o servicio">
            <textarea class="form-control mb-3" name="innovacion" placeholder="¿Cuál es la innovación de tu producto o servicio?"></textarea>

            <textarea class="form-control mb-3" name="valor_cliente" placeholder="¿Cómo creas valor y cómo capturas ese valor?"></textarea>

            <input class="form-control mb-3" name="idea_7_palabras" placeholder="Describe tu idea en 7 palabras">

            <input class="form-control mb-3" name="nombre_proyecto" placeholder="Nombre del proyecto, producto o servicio">

            <select class="form-control mb-3" name="alta_sat">
                <option value="">¿Te encuentras dado de alta ante el SAT?</option>
                <option value="SI">Sí</option>
                <option value="NO">No</option>
            </select>

            <input class="form-control mb-3" type="number" name="personas_trabajan" placeholder="¿Cuántas personas trabajan en el proyecto?">
            <input class="form-control mb-3" type="number" name="miembros_incubacion" placeholder="¿Cuántos miembros participarán en la incubación?">

            <select class="form-control mb-3" name="programas_previos">
                <option value="">¿Han participado en otro programa similar?</option>
                <option value="SI">Sí</option>
                <option value="NO">No</option>
            </select>

            <h5>Información del Líder del Equipo</h5>

            <textarea class="form-control mb-3" name="descripcion_lider" placeholder="Descríbete"></textarea>
            <input class="form-control mb-3" name="rol_lider" placeholder="¿Cuál es tu rol en el emprendimiento?">
            <textarea class="form-control mb-3" name="habilidades" placeholder="Tus habilidades"></textarea>
            <textarea class="form-control mb-4" name="logro_asombroso" placeholder="Cuéntanos algo asombroso que hayas construido"></textarea>

            <button type="submit" class="btn btn-primary w-100">
                Enviar Solicitud
            </button>
        </form>
    </div>
</div>

<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
    <div id="toastExito" class="toast align-items-center text-white bg-primary border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body">
                 ¡Solicitud enviada correctamente!
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById("solicitudForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());

    try {
        // Aquí usamos el mismo origen de Django en el puerto 8000
        const response = await fetch("/solicitudes/", {
            method: "POST",
            headers: { 
        
                "X-CSRFToken": document.querySelector('[name=csrfmiddlewaretoken]').value 
            },
            body: formData
        });

        if (response.ok) {
            const result = await response.json();

            // Mensaje simple de éxito
            alert("✅ Solicitud enviada correctamente");

            this.reset(); // Limpiamos el formulario
        } else {
            const errorData = await response.json();
            alert("❌ Error: " + (errorData.error || "No se pudo procesar la solicitud"));
        }
    } catch (error) {
        console.error("Error de conexión:", error);
        alert("⚠️ No se pudo conectar con el servidor. Verifica que Django esté corriendo en el puerto 8000.");
    }
});
</script>


</body>
</html>
