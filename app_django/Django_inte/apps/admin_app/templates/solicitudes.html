{% extends 'panel_admin.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/crear_convocatoria.css' %}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="{% static 'css/solicitudes.css' %}">

    <div class="convocatorias-container">
        <div class="header-container">
            <h2>Solicitudes Recibidas</h2>
            <div class="filters">
                <input type="search" id="filtroTextoSolicitudes" placeholder="Buscar nombre o proyecto" aria-label="Buscar solicitud">
                <select id="filtroEstadoSolicitudes" aria-label="Filtrar por estado">
                    <option value="todos">Todos</option>
                    <option value="EN PROCESO" selected>En proceso</option>
                    <option value="Aceptado">Aceptado</option>
                    <option value="Rechazado">Rechazado</option>
                </select>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Proyecto</th>
                        <th>Fecha</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaSolicitudes"></tbody>
            </table>
        </div>
    </div>

{% include "modals/modal_detalle_solicitud.html" %}
{% include "modals/modal_credenciales.html" %}
{% include "modals/modal_rechazar.html" %}

<script src="{% static 'js/solicitudes.js' %}"></script>
{% endblock %}
