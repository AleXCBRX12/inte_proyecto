{% load static %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>
/* ===== MODAL BASE ===== */
.modal{
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.5);
    backdrop-filter: blur(4px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

/* ===== CONTENEDOR ===== */
.modal-content{
    background: #ffffff;
    width: 100%;
    max-width: 520px;
    padding: 2.2rem;
    border-radius: 18px;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
}

/* ===== TITULO ===== */
.modal-content h3{
    margin-bottom: 1.5rem;
    color: #3873c7;
    font-size: 1.6rem;
    font-weight: 700;
    text-align: center;
}

/* ===== FORM ===== */
.modal-content form{
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
}

/* ===== INPUTS ===== */
.modal-content input{
    width: 100%;
    padding: 0.8rem 1rem;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    font-size: 0.95rem;
    transition: 0.2s;
}

.modal-content input:focus{
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

/* ===== PASSWORD ===== */
.password-wrapper{
    position: relative;
    display: flex;
    align-items: center;
}

.password-wrapper input{
    width: 100%;
    padding-right: 4.5rem;
}

/* ICONOS PASSWORD */
.pass-icons{
    position: absolute;
    right: 10px;
    display: flex;
    gap: 10px;
    color: #64748b;
}

.pass-icons i{
    cursor: pointer;
    font-size: 18px;
}

.pass-icons i:hover{
    color: #1e293b;
}

/* ===== BOTONES ===== */
.modal-actions{
    display: flex;
    gap: 1rem;
    margin-top: 1rem;
}

.modal-actions button{
    flex: 1;
    padding: 0.85rem;
    border: none;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.modal-actions button:hover{
    transform: translateY(-3px);
    box-shadow: 0 6px 14px rgba(0, 0, 0, 0.15);
}

.modal-actions button:active{
    transform: translateY(-1px);
}

/* estilos botones */
.btn-cancelar{
    background: #f1f5f9;
    color: #475569;
}

.btn-confirmar{
    background: #2563eb;
    color: white;
}
</style>

<div id="modalAdmin" class="modal">

    <div class="modal-content">

        <h3>Crear Administrador</h3>

        <form method="POST" action="#">
            {% csrf_token %}

            <input 
                type="text" 
                name="nombre" 
                placeholder="Nombre del administrador" 
                required
            >

            <input 
                type="email" 
                name="correo" 
                placeholder="Correo" 
                required
            >

            <div class="password-wrapper">

                <input 
                    type="password" 
                    id="password"
                    name="password" 
                    placeholder="Contraseña" 
                    required
                >

                <div class="pass-icons">
                    <i class="bi bi-eye-slash" id="togglePassword"></i>
                    <i class="bi bi-shuffle" id="generatePassword"></i>
                </div>

            </div>

            <div class="modal-actions">

                <button 
                    type="button" 
                    class="btn-cancelar" 
                    onclick="cerrarModal()">
                    Cancelar
                </button>

                <button 
                    type="button" 
                    class="btn-confirmar"
                    onclick="crearAdministrador()">
                    Confirmar
                </button>

            </div>

        </form>

    </div>

</div>

<script>
const togglePassword = document.getElementById('togglePassword');
const generatePassword = document.getElementById('generatePassword');
const passwordInput = document.getElementById('password');

/* VER / OCULTAR PASSWORD */
togglePassword.addEventListener('click', function() {
    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordInput.setAttribute('type', type);

    this.classList.toggle('bi-eye');
    this.classList.toggle('bi-eye-slash');
});

/* GENERAR PASSWORD */
generatePassword.addEventListener('click', function() {
    const mayus = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const minus = "abcdefghijklmnopqrstuvwxyz";
    const nums = "0123456789";

    const todos = mayus + minus + nums;

    let password = [];

    // Asegurar variedad mínima
    password.push(mayus[Math.floor(Math.random() * mayus.length)]);
    password.push(minus[Math.floor(Math.random() * minus.length)]);
    password.push(nums[Math.floor(Math.random() * nums.length)]);

    // Completar hasta 8 caracteres
    while (password.length < 8) {
        password.push(todos[Math.floor(Math.random() * todos.length)]);
    }

    // Mezclar bien (Fisher-Yates shuffle)
    for (let i = password.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [password[i], password[j]] = [password[j], password[i]];
    }

    passwordInput.value = password.join('');
});

/* abrir modal */
function abrirModal() {
    document.getElementById('modalAdmin').style.display = 'flex';
}

/* cerrar modal */
function cerrarModal() {
    document.getElementById('modalAdmin').style.display = 'none';

    passwordInput.setAttribute('type', 'password');
    togglePassword.classList.remove('bi-eye');
    togglePassword.classList.add('bi-eye-slash');
}
</script>
