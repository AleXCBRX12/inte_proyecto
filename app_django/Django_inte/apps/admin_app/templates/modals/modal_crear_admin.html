{% load static %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>
/* ===== MODAL ===== */
.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.55);
    backdrop-filter:blur(6px);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

/* ===== CONTENIDO MODAL ===== */
.modal-content{
    background:white;
    padding:45px;
    width:460px;
    border-radius:16px;

    display:flex;
    flex-direction:column;
    align-items:center;
    gap:28px;

    position:relative;

    transform:scale(.8);
    opacity:0;
    animation:modalEntrada .35s ease forwards;

    box-shadow:0 20px 40px rgba(0,0,0,.25);
}

/* ===== TITULO ===== */
.modal-content h3{
    text-align:center;
    color:var(--azul);
    font-size:24px;
    font-weight:700;
}

/* ===== FORMULARIO ===== */
.modal-content form{
    width:100%;
    display:flex;
    flex-direction:column;
    gap:18px;
}

/* ===== INPUTS ===== */
.modal-content input{
    width:100%;
    padding:15px 16px;
    font-size:15px;

    border-radius:10px;
    border:1px solid var(--gris2);
    background:#fafafa;

    transition:.2s;
}

.modal-content input:focus{
    border-color:var(--azul2);
    box-shadow:0 0 6px rgba(45,91,209,.25);
    outline:none;
}

/* ===== CONTENEDOR PASSWORD ===== */
.password-wrapper{
    position:relative;
    width:100%;
}

.password-wrapper input{
    padding-right:45px;
}

/* ===== ICONO VER PASSWORD ===== */
.password-toggle{
    position:absolute;
    right:14px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color:#6b7280;
    font-size:18px;
}

.password-toggle:hover{
    color:var(--azul2);
}

/* ===== BOTONES DEL MODAL ===== */
.modal-actions{
    display:flex;
    gap:14px;
    width:100%;
    margin-top:10px;
}

.modal-actions button{
    flex:1;
    position:relative;
    overflow:hidden;
}

/* ===== EFECTO BRILLO IGUAL PARA BOTONES ===== */
.modal-actions button::before{
    content:'';
    position:absolute;
    top:0;
    left:-75%;
    width:50%;
    height:100%;
    background:rgba(255,255,255,.22);
    transform:skewX(-25deg);
    transition:.7s;
}

.modal-actions button:hover::before{
    left:130%;
}

/* brillo más suave para cancelar */
.modal-actions .btn-cancelar::before{
    background:rgba(255,255,255,.15);
}

/* ===== BOTON CERRAR ===== */
.modal-close{
    position:absolute;
    right:16px;
    top:12px;
    border:none;
    background:none;
    font-size:24px;
    cursor:pointer;
    color:#444;
}

.modal-close:hover{
    color:#ef4444;
}

/* ===== ANIMACION ===== */
@keyframes modalEntrada{
    0%{
        transform:scale(.8);
        opacity:0;
    }
    60%{
        transform:scale(1.05);
        opacity:1;
    }
    100%{
        transform:scale(1);
        opacity:1;
    }
}
</style>

<div id="modalAdmin" class="modal">

    <div class="modal-content">

        <h3>Crear Administrador</h3>

        <form method="POST" action="#">
            {% csrf_token %}

            <input 
                type="text" 
                name="nombre" 
                placeholder="Nombre del administrador" 
                required
            >

            <input 
                type="email" 
                name="correo" 
                placeholder="Correo" 
                required
            >

            <div class="password-wrapper">

                <input 
                    type="password" 
                    id="password"
                    name="password" 
                    placeholder="Contraseña" 
                    required
                >

                <!-- Ojo inicial cerrado -->
                <i class="bi bi-eye-slash password-toggle" id="togglePassword"></i>

            </div>

            <div class="modal-actions">

                <button 
                    type="button" 
                    class="btn-cancelar" 
                    onclick="cerrarModal()">
                    Cancelar
                </button>

                <button 
                    type="button" 
                    class="btn-confirmar"
                    onclick="crearAdministrador()">
                    Confirmar
                </button>

            </div>

        </form>

    </div>

</div>

<script>
const togglePassword = document.getElementById('togglePassword');
const passwordInput = document.getElementById('password');

togglePassword.addEventListener('click', function() {
    // Alternar tipo de input
    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordInput.setAttribute('type', type);

    // Alternar icono
    this.classList.toggle('bi-eye');
    this.classList.toggle('bi-eye-slash');
});

// Función para abrir el modal
function abrirModal() {
    const modal = document.getElementById('modalAdmin');
    modal.style.display = 'flex';
}

// Función para cerrar el modal
function cerrarModal() {
    const modal = document.getElementById('modalAdmin');
    modal.style.display = 'none';

    // Reiniciar input password y icono
    passwordInput.setAttribute('type', 'password');
    togglePassword.classList.remove('bi-eye');
    togglePassword.classList.add('bi-eye-slash');
}

// Función ejemplo para crear administrador
function crearAdministrador() {
    alert('Aquí iría la lógica para crear el administrador');
    cerrarModal();
}
</script>
