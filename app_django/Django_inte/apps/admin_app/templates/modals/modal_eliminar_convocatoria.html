{% load static %}
<style>

/* =========================
   OVERLAY CON BLUR
========================= */
.modal-confirm{
    position: fixed;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;

    background: rgba(15, 23, 42, 0.55);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    animation: fadeIn .2s ease;
}

/* =========================
   CONTENIDO DEL MODAL
========================= */
.modal-confirm-content{
    background: #ffffff;
    padding: 28px 24px;
    border-radius: 20px;
    max-width: 420px;
    width: 100%;
    text-align: center;

    box-shadow: 0 25px 80px rgba(0,0,0,0.35);
    animation: scaleIn .25s ease;
}

/* =========================
   ICONO
========================= */
.modal-confirm-icon{
    width: 70px;
    height: 70px;
    margin: 0 auto 15px;

    display: flex;
    align-items: center;
    justify-content: center;

    background: rgba(239,68,68,0.1);
    color: #ef4444;
    border-radius: 50%;
    font-size: 30px;
}

/* =========================
   TITULO
========================= */
.modal-confirm-title{
    font-size: 1.4rem;
    font-weight: 900;
    color: #0f172a;
    margin-bottom: 10px;
}

/* =========================
   TEXTO
========================= */
.modal-confirm-text{
    color: #64748b;
    font-size: 0.95rem;
    margin-bottom: 20px;
}

/* =========================
   BOTONES
========================= */
.modal-confirm-footer{
    display: flex;
    gap: 10px;
    justify-content: center;
}

.modal-confirm-btn{
    padding: 10px 16px;
    border-radius: 10px;
    border: none;
    font-weight: 800;
    cursor: pointer;
    transition: .25s;
    min-width: 120px;
}

/* cancelar */
.btn-cancel{
    background: #f1f5f9;
    color: #64748b;
}

.btn-cancel:hover{
    background: #e2e8f0;
    transform: translateY(-2px);
}

/* eliminar */
.btn-confirm-delete{
    background: #ef4444;
    color: white;
}

.btn-confirm-delete:hover{
    background: #dc2626;
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 6px 18px rgba(239,68,68,0.35);
}

/* =========================
   ANIMACIONES
========================= */
@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

@keyframes scaleIn{
    from{
        transform: scale(.9);
        opacity: 0;
    }
    to{
        transform: scale(1);
        opacity: 1;
    }
}

</style>

<!-- Custom Confirmation Modal -->
<div id="modalConfirmDelete" class="modal-confirm" style="display:none;">
    <div class="modal-confirm-content">
        <div class="modal-confirm-icon">
            <i class="bi bi-exclamation-triangle-fill"></i>
        </div>
        <h3 class="modal-confirm-title">¿Estás seguro?</h3>
        <p class="modal-confirm-text">Esta acción no se puede deshacer. La publicación será eliminada permanentemente del sistema.</p>
        <div class="modal-confirm-footer">
            <button class="modal-confirm-btn btn-cancel" onclick="closeConfirmModal()">Cancelar</button>
            <button id="btnConfirmAction" class="modal-confirm-btn btn-confirm-delete">Sí, Eliminar</button>
        </div>
    </div>
</div>
