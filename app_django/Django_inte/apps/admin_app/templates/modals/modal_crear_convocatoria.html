<!-- =========================
      MODAL CREAR
========================= -->
<div class="modal" id="modalCrear">
    <div class="modal-content">
        <button type="button" class="modal-close" onclick="cerrarModalCrear()">×</button>

        <h3>Crear Nueva Convocatoria</h3>

        <form id="formCrear"
              method="POST"
              enctype="multipart/form-data">

            {% csrf_token %}

            <input type="text"
                   name="titulo"
                   id="crearTitulo"
                   placeholder="Título de la convocatoria"
                   required>

            <input type="datetime-local"
                   name="fecha_fin"
                   id="crearFecha"
                   required>

            <input type="file"
                   name="banner"
                   id="crearBanner">

            <textarea name="docs_requeridos"
                      id="crearDocs"
                      placeholder="Documentos críticos (separados por coma). Ej: Plan de negocios, Pitch deck"
                      rows="3"></textarea>

            <div class="modal-actions">
                <button type="submit" class="btn-guardar">
                    Crear Convocatoria
                </button>
            </div>
        </form>
    </div>
</div>
