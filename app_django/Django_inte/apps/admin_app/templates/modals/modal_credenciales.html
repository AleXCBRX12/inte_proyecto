<style>
/* ================================
   MODAL CENTRADO Y ELEGANTE
================================= */
.solicitud-modal{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10000; /* 👈 más alto */
}

.modal-credenciales{
    width: 420px;
    max-width: 95%;
    background: #ffffff;
    border-radius: 18px;
    padding: 32px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    animation: modalFade .25s ease;
    position: relative;
}

@keyframes modalFade{
    from{ opacity:0; transform:translateY(15px);}
    to{ opacity:1; transform:translateY(0);}
}

.modal-credenciales h3{
    text-align:center;
    font-size:20px;
    font-weight:600;
    color:#111827;
    margin-bottom:6px;
}

.modal-subtitle{
    text-align:center;
    font-size:13px;
    color:#6b7280;
    margin-bottom:28px;
}

/* ================================
   FORM
================================= */
.form-group{
    margin-bottom:22px;
    position:relative;
}

.form-group label{
    font-size:13px;
    font-weight:500;
    color:#374151;
    display:block;
    margin-bottom:6px;
}

.form-group input{
    width:100%;
    padding:12px 14px;
    border-radius:12px;
    border:1.5px solid #d1d5db;
    font-size:14px;
    transition:.2s ease;
}

.form-group input:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,0.12);
    outline:none;
}

/* ERROR integrado */
.input-error{
    border-color:#dc2626 !important;
}

/* ================================
   PASSWORD BOX
================================= */
.password-box{
    display:flex;
    align-items:center;
    gap:8px;
}

.password-box input{
    flex:1;
}

/* BOTÓN ICONO GENERAR */
.btn-generate{
    width:38px;
    height:38px;
    border-radius:10px;
    border:1px solid #d1d5db;
    background:#f3f4f6;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:.2s ease;
}

.btn-generate:hover{
    background:#e5e7eb;
    transform:scale(1.05);
}

/* ================================
   BOTÓN PRINCIPAL SUAVE
================================= */
.modal-confirmar{
    width:100%;
    padding:12px;
    border-radius:14px;
    border:none;
    background:#2563eb;
    color:white;
    font-size:14px;
    font-weight:500;
    cursor:pointer;
    transition:.25s ease;
}

.modal-confirmar:hover{
    background:#1e40af;
    transform:translateY(-2px);
}

.modal-confirmar:active{
    transform:scale(.98);
}

/* BOTÓN CERRAR MODAL */
.modal-close{
    position:absolute;
    top:12px;
    right:12px;
    background:transparent;
    border:none;
    font-size:22px;
    cursor:pointer;
    color:#374151;
}
</style>

<div class="solicitud-modal" id="modalCredenciales">
    <div class="solicitud-modal-content modal-credenciales">
        <button class="modal-close" onclick="cerrarModal('modalCredenciales')">×</button>

        <h3>Crear Credenciales</h3>
        <p class="modal-subtitle">
            Complete los campos para crear la cuenta
        </p>

    

        <div class="form-group">
            <label>Contraseña *</label>
            <div class="password-box">
                <input type="text" id="nuevaPassword" placeholder="Ingrese contraseña">
                <button type="button" class="btn-generate" onclick="generarPassword()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <path d="M4 4v6h6M20 20v-6h-6" stroke="#374151" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M5 19a9 9 0 0014-7M19 5a9 9 0 00-14 7" stroke="#374151" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <span class="error-text" id="errorPassword"></span>
        </div>

        <button class="modal-confirmar" onclick="guardarCredenciales()">
            Crear Cuenta
        </button>
    </div>
</div>
