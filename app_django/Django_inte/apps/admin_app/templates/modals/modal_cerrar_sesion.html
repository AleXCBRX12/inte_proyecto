{% load static %}

<style>

/* ================================
   BLOQUEO DE SCROLL
================================ */
body.modal-open{
    overflow: hidden;
}

/* ================================
   OVERLAY
================================ */
.logout-modal{
    position: fixed;
    inset: 0;
    background: rgba(9, 16, 32, 0.65);
    backdrop-filter: blur(6px);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    visibility: hidden;
    transition: opacity .35s ease;
    z-index: 9999;
}

.logout-modal.active{
    opacity: 1;
    visibility: visible;
}

/* ================================
   CAJA PRINCIPAL
================================ */
.logout-box{
    background: #ffffff;
    width: 410px;
    padding: 38px 32px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.22);

    /* Animación de frente */
    transform: scale(0.9);
    opacity: 0;
    transition: 
        transform .35s cubic-bezier(.22,.61,.36,1),
        opacity .35s ease;
}

.logout-modal.active .logout-box{
    transform: scale(1);
    opacity: 1;
}

/* ================================
   TITULO Y TEXTO
================================ */
.logout-box h3{
    font-size: 19px;
    font-weight: 600;
    color: #1f3c88;
    margin-bottom: 10px;
}

.logout-box p{
    font-size: 14.5px;
    color: #555;
    margin-bottom: 30px;
    line-height: 1.5;
}

/* ================================
   BOTONES
================================ */
.logout-actions{
    display: flex;
    gap: 12px;
}

.btn-cancelar,
.btn-salir{
    flex: 1;
    padding: 11px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s ease;
}

/* CANCELAR — gris medio */
.btn-cancelar{
    border: none;
    background: #b0b7c3;
    color: #2f2f2f;
}

.btn-cancelar:hover{
    background: #9aa3b1;
}

/* CERRAR SESIÓN — rojo sobrio */
.btn-salir{
    border: none;
    background: #c62828;
    color: #fff;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
}

.btn-salir:hover{
    background: #b71c1c;
}

/* EFECTO SUAVE AL HACER CLICK */
.btn-cancelar:active,
.btn-salir:active{
    transform: scale(.96);
}

</style>

<div class="logout-modal" id="logoutModal">
    <div class="logout-box">
        <h3>Confirmar cierre de sesión</h3>
        <p>¿Estás segura que deseas salir del sistema?</p>

        <div class="logout-actions">
            <button class="btn-cancelar" onclick="cerrarModalLogout()">Cancelar</button>
            <a href="/login/" class="btn-salir">Sí, cerrar sesión</a>
        </div>
    </div>
</div>

<script>
function abrirModalLogout(){
    document.getElementById("logoutModal").classList.add("active");
    document.body.classList.add("modal-open");
}

function cerrarModalLogout(){
    document.getElementById("logoutModal").classList.remove("active");
    document.body.classList.remove("modal-open");
}

/* Cerrar si hacen click fuera */
window.addEventListener("click", function(event){
    const modal = document.getElementById("logoutModal");
    if(event.target === modal){
        cerrarModalLogout();
    }
});
</script>
