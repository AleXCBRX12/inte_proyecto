{% load static %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<!-- ===== ALERTA ===== -->
<style>
.alert-msg {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 20px;
    border-radius: 10px;
    display: none;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 500;
    z-index: 10000;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}
.alert-msg i { font-size: 18px; }
.alert-error { background: #ef4444; color: white; }
.alert-success { background: #10b981; color: white; }
</style>

<div id="alertBox" class="alert-msg"></div>

<!-- ===== MODAL ===== -->
<style>
#modalPassword {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

#modalPassword .modal-contenido {
    background: #ffffff;
    padding: 40px 30px;
    width: 420px;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 25px;
    position: relative;
    transform: scale(0.8);
    opacity: 0;
    animation: modalPasswordEntrada 0.35s ease forwards;
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
}

/* 🔒 ICONO PRO */
.lock-icon {
    font-size: 55px;
    color: #1e3a8a;
    background: #e0e7ff;
    width: 85px;
    height: 85px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 10px 25px rgba(30, 58, 138, 0.25);
    animation: pulseLock 1.6s infinite;
}

@keyframes pulseLock {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}

#modalPassword h3 {
    text-align: center;
    color: #1e3a8a;
    font-size: 24px;
    font-weight: 700;
}

.password-wrapper {
    position: relative;
    width: 100%;
}

.password-wrapper input {
    width: 100%;
    padding: 15px 80px 15px 16px;
    font-size: 15px;
    border-radius: 10px;
    border: 1px solid #d1d5db;
    background: #fafafa;
}

.password-wrapper input:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 6px rgba(59,130,246,0.25);
    outline: none;
}

.password-icons {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    gap: 10px;
    color: #6b7280;
}

.password-icons i {
    cursor: pointer;
    font-size: 18px;
}

.password-icons i:hover {
    color: #3b82f6;
}

#modalPassword .modal-buttons {
    display: flex;
    gap: 12px;
    width: 100%;
}

#modalPassword .modal-buttons button {
    flex: 1;
    padding: 12px 0;
    font-size: 15px;
    font-weight: 600;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    border: none;
}

/* ✨ EFECTO BRILLO */
#modalPassword .modal-buttons button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -75%;
    width: 50%;
    height: 100%;
    background: rgba(255,255,255,0.22);
    transform: skewX(-25deg);
    transition: 0.7s;
}

#modalPassword .modal-buttons button:hover::before {
    left: 130%;
}

/* BOTONES MEJORADOS */
.aceptar {
    background: #1e3a8a;
    color: #ffffff;
    transition: all 0.25s ease;
}

.aceptar:hover {
    background: #1e40af;
}

.cancelar {
    background: #d1d5db;
    color: #374151;
    transition: all 0.25s ease;
}

.cancelar:hover {
    background: #9ca3af;
    color: #1f2937;
}

@keyframes modalPasswordEntrada {
    0% { transform: scale(0.8); opacity: 0; }
    60% { transform: scale(1.05); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
}
</style>

<!-- ===== HTML ===== -->
<div id="modalPassword">
    <div class="modal-contenido">

        <div class="lock-icon">
            <i class="bi bi-shield-lock-fill"></i>
        </div>

        <h3>Cambiar Contraseña</h3>

        <div class="password-wrapper">
            <input type="password" id="nuevaPassword" placeholder="Nueva contraseña">
            <div class="password-icons">
                <i class="bi bi-eye-slash" id="togglePass"></i>
                <i class="bi bi-shuffle" id="genPass"></i>
            </div>
        </div>

        <div class="modal-buttons">
            <button class="cancelar" onclick="cerrarModalPassword()">Cancelar</button>
            <button class="aceptar" onclick="confirmarCambioPassword()">Aceptar</button>
        </div>
    </div>
</div>

<!-- ===== JS (SIN CAMBIOS) ===== -->
<script>
let modalAbierto = false;
let adminId = null;

function setAdminId(id){
    console.log("ID recibido:", id);
    adminId = id;
    abrirModalPassword();
}

function showAlert(msg, type="error"){
    const box = document.getElementById("alertBox");

    box.className = "alert-msg " + (type === "success" ? "alert-success" : "alert-error");

    box.innerHTML = `
        <i class="bi ${type === "success" ? "bi-check-circle" : "bi-exclamation-triangle"}"></i>
        <span>${msg}</span>
    `;

    box.style.display = "flex";
    setTimeout(() => box.style.display = "none", 3500);
}

function abrirModalPassword(){
    modalAbierto = true;
    document.getElementById("modalPassword").style.display = "flex";
}

function cerrarModalPassword(){
    modalAbierto = false;
    document.getElementById("modalPassword").style.display = "none";
}

document.getElementById("togglePass").addEventListener("click", function(){
    const input = document.getElementById("nuevaPassword");
    input.type = input.type === "password" ? "text" : "password";
    this.classList.toggle("bi-eye");
    this.classList.toggle("bi-eye-slash");
});

document.getElementById("genPass").addEventListener("click", function(){
    const randomPass = Math.random().toString(36).slice(-10);
    document.getElementById("nuevaPassword").value = randomPass;
    showAlert("Contraseña generada", "success");
});

async function confirmarCambioPassword(){
    const nueva = document.getElementById("nuevaPassword").value.trim();

    if(!adminId){
        showAlert("Error: no se seleccionó el administrador");
        return;
    }

    if(!nueva){
        showAlert("La contraseña es obligatoria");
        return;
    }

    try {
        const resp = await fetch("{% url 'actualizar_password_admin' 'TEMP' %}".replace("TEMP", adminId), {
            method: "POST",
            headers: {
                "Content-Type":"application/json",
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: JSON.stringify({password: nueva})
        });

        const data = await resp.json();

        console.log("RESPUESTA:", data);

        if(data.success){
            cerrarModalPassword();
            triggerPasswordSuccess();

            setTimeout(() => {
                location.reload();
            }, 3600);
            return;
        }

        if(data.error){
            showAlert(data.error, "error");
            return;
        }

    } catch (err){
        console.error(err);
        showAlert("Error de conexión con el servidor");
    }
}
</script>
