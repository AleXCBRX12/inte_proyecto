{% load static %}

<style>
/* ===== MODAL ELIMINACIÓN ===== */
#modalEliminar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

/* CONTENIDO */
#modalEliminar .modal-contenido {
    background: #fff;
    padding: 30px 25px;
    width: 400px;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    animation: modalEntrada 0.35s ease forwards;
    box-shadow: 0 15px 35px rgba(0,0,0,0.25);
    text-align: center;
}

/* ICONO ADVERTENCIA */
.warning-icon {
    font-size: 60px;
    color: #dc2626;
    background: #fee2e2;
    width: 90px;
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    box-shadow: 0 10px 25px rgba(220, 38, 38, 0.3);
    animation: pulseWarning 1.5s infinite;
}

@keyframes pulseWarning {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}

#modalEliminar h3 {
    font-size: 22px;
    color: #dc2626;
    font-weight: 700;
}

#modalEliminar p {
    font-size: 15px;
    color: #374151;
}

#modalEliminar .modal-buttons {
    display: flex;
    gap: 12px;
    width: 100%;
}

/* BOTONES BASE */
#modalEliminar button {
    flex: 1;
    padding: 10px 0;
    font-weight: 600;
    border-radius: 10px;
    cursor: pointer;
    border: none;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
}

/* EFECTO DE LUZ (SUAVE IDA Y VUELTA) */
#modalEliminar button::before {
    content: "";
    position: absolute;
    top: 0;
    left: -75%;
    width: 50%;
    height: 100%;
    background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.5),
        transparent
    );
    transform: skewX(-20deg);
    transition: left 0.6s ease;
}

/* HOVER: LUZ AVANZA */
#modalEliminar button:hover::before {
    left: 125%;
}

/* BOTÓN ELIMINAR */
#modalEliminar .eliminar {
    background: #dc2626;
    color: #fff;
}

#modalEliminar .eliminar:hover {
    background: #b91c1c;
}

/* BOTÓN CANCELAR */
#modalEliminar .cancelar {
    background: #d1d5db;
    color: #374151;
}

#modalEliminar .cancelar:hover {
    background: #9ca3af;
    color: #1f2937;
}

/* ===== ANIMACIÓN MODAL ===== */
@keyframes modalEntrada {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

/* ===== MODAL PRO ===== */
.pro-modal-overlay {
  position: fixed;
  top: 0; left: 0; 
  width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(6px);
  display: none;
  align-items: center; justify-content: center;
  z-index: 11000;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.pro-modal-card {
  background: #ffffff;
  padding: 40px;
  border-radius: 24px;
  text-align: center;
  box-shadow: 0 20px 50px rgba(0,0,0,0.2);
  transform: scale(0.7);
  transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  min-width: 300px;
}

.pro-modal-overlay.show { display: flex; opacity: 1; }
.pro-modal-overlay.show .pro-modal-card { transform: scale(1); }

.pro-modal-overlay.exit { opacity: 0; }
.pro-modal-overlay.exit .pro-modal-card { transform: scale(1.15); opacity: 0; }

.pro-spinner {
  width: 70px; height: 70px;
  border: 6px solid #f3f3f3;
  border-top: 6px solid #1e3a8a;
  border-radius: 50%;
  margin: 0 auto 25px;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* CHECK */
.success-checkmark {
  width: 80px; height: 80px;
  margin: 0 auto 25px;
  position: relative;
}

.check-icon {
  width: 80px; height: 80px;
  border-radius: 50%;
  border: 4px solid #10b981;
}

.icon-line {
  height: 5px;
  background-color: #10b981;
  position: absolute;
}

.line-tip {
  top: 45px; left: 14px;
  width: 25px;
  transform: rotate(45deg);
}

.line-long {
  top: 38px; right: 8px;
  width: 47px;
  transform: rotate(-45deg);
}

.modal-text {
  color: #1e3a8a;
  font-size: 1.3rem;
  font-weight: 700;
}
</style>

<!-- MODAL ELIMINAR -->
<div id="modalEliminar">
    <div class="modal-contenido">

        <div class="warning-icon">⚠</div>

        <h3>Eliminar Administrador</h3>
        <p>¿Deseas eliminar este administrador?</p>

        <div class="modal-buttons">
            <button class="cancelar" onclick="cerrarModalEliminar()">Cancelar</button>
            <button class="eliminar" onclick="confirmarEliminar()">Eliminar</button>
        </div>
    </div>
</div>

<!-- MODAL PRO -->
<div id="proModal" class="pro-modal-overlay">
  <div class="pro-modal-card">
    <div id="modalSpinner" class="pro-spinner"></div>

    <div id="modalCheck" class="success-checkmark" style="display:none;">
        <div class="check-icon">
            <span class="icon-line line-tip"></span>
            <span class="icon-line line-long"></span>
        </div>
    </div>

    <h3 class="modal-text">Procesando...</h3>
  </div>
</div>

<script>
let adminIdEliminar = null;

/* ABRIR */
function abrirModalEliminar(id){
    adminIdEliminar = id;
    document.getElementById("modalEliminar").style.display = "flex";
}

/* CERRAR */
function cerrarModalEliminar(){
    document.getElementById("modalEliminar").style.display = "none";
    adminIdEliminar = null;
}

/* CONFIRMAR */
async function confirmarEliminar(){
    if(!adminIdEliminar) return;

    const modal = document.getElementById('proModal');
    const spinner = document.getElementById('modalSpinner');
    const check = document.getElementById('modalCheck');
    const text = modal.querySelector('.modal-text');

    /* Mostrar carga */
    spinner.style.display = 'block';
    check.style.display = 'none';
    text.innerText = 'Eliminando administrador...';

    modal.classList.add('show');

    try {
        const resp = await fetch("{% url 'eliminar_admin' 'TEMP' %}".replace("TEMP", adminIdEliminar), {
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "X-CSRFToken":"{{ csrf_token }}"
            }
        });

        const data = await resp.json();

        if(data.success){

            const fila = document.querySelector(`tr[data-id='${adminIdEliminar}']`);
            if(fila) fila.remove();
            verificarTablaVacia();

            cerrarModalEliminar();

            setTimeout(() => {
                spinner.style.display = 'none';
                check.style.display = 'block';
                text.innerText = '¡Administrador eliminado!';
                text.style.color = '#10b981';
            }, 800);

            setTimeout(() => {
                modal.classList.add('exit');
                setTimeout(() => {
                    modal.classList.remove('show','exit');
                }, 500);
            }, 2500);

        } else {
            alert("No se pudo eliminar");
        }

    } catch(err){
        console.error(err);
        alert("Error de conexión");
    }
}
</script>
