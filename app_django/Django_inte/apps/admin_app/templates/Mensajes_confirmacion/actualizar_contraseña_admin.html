<!-- MODAL PRO: CARGA Y ÉXITO -->
<div id="proModal" class="pro-modal-overlay">
  <div class="pro-modal-card">
    <div class="icon-wrapper">
      <!-- Spinner de carga -->
      <div id="modalSpinner" class="pro-spinner"></div>
      
      <!-- Checkmark (Palomita) Corregida -->
      <div id="modalCheck" class="success-checkmark" style="display: none;">
        <div class="check-icon">
          <span class="icon-line line-tip"></span>
          <span class="icon-line line-long"></span>
          <div class="icon-circle"></div>
        </div>
      </div>
    </div>
    
    <h3 class="modal-text">Actualizando...</h3>
  </div>
</div>

<style>
/* 1. Contenedor Principal (Overlay) */
.pro-modal-overlay {
  position: fixed;
  top: 0; left: 0; 
  width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(6px);
  display: none; /* Se controla con JS */
  align-items: center; justify-content: center;
  z-index: 11000; /* Por encima de todo */
  opacity: 0;
  transition: opacity 0.3s ease;
}

/* 2. Tarjeta (Entrada suave de frente) */
.pro-modal-card {
  background: #ffffff;
  padding: 40px;
  border-radius: 24px;
  text-align: center;
  box-shadow: 0 20px 50px rgba(0,0,0,0.2);
  transform: scale(0.7); /* Inicia pequeño para el zoom */
  transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  min-width: 300px;
}

/* Animaciones de estado */
.pro-modal-overlay.show { display: flex; opacity: 1; }
.pro-modal-overlay.show .pro-modal-card { transform: scale(1); }

/* Salida suave hacia el frente */
.pro-modal-overlay.exit { opacity: 0; }
.pro-modal-overlay.exit .pro-modal-card { transform: scale(1.15); opacity: 0; }

/* 3. El Spinner */
.pro-spinner {
  width: 70px; height: 70px;
  border: 6px solid #f3f3f3;
  border-top: 6px solid #1e3a8a;
  border-radius: 50%;
  margin: 0 auto 25px;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* 4. LA PALOMITA (CORREGIDA Y AJUSTADA) */
.success-checkmark {
  width: 80px; height: 80px;
  margin: 0 auto 25px;
  position: relative;
}

.check-icon {
  width: 80px; height: 80px;
  position: relative;
  border-radius: 50%;
  border: 4px solid #10b981; /* Verde esmeralda */
  box-sizing: border-box;
}

.icon-line {
  height: 5px;
  background-color: #10b981;
  display: block;
  border-radius: 2px;
  position: absolute;
  z-index: 10;
}

/* Parte corta de la palomita */
.line-tip {
  top: 45px; left: 14px;
  width: 25px;
  transform: rotate(45deg);
  animation: anim-line-tip 0.4s ease-out forwards;
}

/* Parte larga de la palomita */
.line-long {
  top: 38px; right: 8px;
  width: 47px;
  transform: rotate(-45deg);
  animation: anim-line-long 0.4s ease-out 0.3s forwards; /* Delay para que empiece tras la corta */
  opacity: 0; /* Inicia invisible */
}

@keyframes anim-line-tip {
  0% { width: 0; left: 1px; top: 19px; }
  100% { width: 25px; left: 14px; top: 45px; }
}

@keyframes anim-line-long {
  0% { width: 0; right: 46px; top: 54px; opacity: 1; }
  100% { width: 47px; right: 8px; top: 38px; opacity: 1; }
}

.modal-text {
  font-family: 'Segoe UI', sans-serif;
  color: #1e3a8a;
  margin: 0;
  font-size: 1.3rem;
  font-weight: 700;
  transition: color 0.3s ease;
}
</style>

<script>
function triggerPasswordSuccess() {
    const modal = document.getElementById('proModal');
    const spinner = document.getElementById('modalSpinner');
    const check = document.getElementById('modalCheck');
    const text = modal.querySelector('.modal-text');

    // 1. Mostrar el modal y resetear estados
    spinner.style.display = 'block';
    check.style.display = 'none';
    text.innerText = 'Actualizando...';
    text.style.color = '#1e3a8a';
    
    modal.classList.remove('exit');
    modal.classList.add('show');

    // 2. Simular carga (1.5 segundos) y mostrar éxito
    setTimeout(() => {
        spinner.style.display = 'none';
        check.style.display = 'block';
        text.innerText = '¡Contraseña Actualizada!';
        text.style.color = '#10b981';
    }, 1500);

    // 3. Auto-cierre (Zoom hacia adelante) a los 3.5 segundos totales
    setTimeout(() => {
        modal.classList.add('exit');
        setTimeout(() => {
            modal.classList.remove('show', 'exit');
        }, 500);
    }, 4000);
}
</script>
