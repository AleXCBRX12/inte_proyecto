{% load static %}

<style>

/* ===== TOPBAR ===== */

.topbar{
background:var(--azul);
color:white;
padding:0 20px;
display:flex;
justify-content:space-between;
align-items:center;
height:65px;
box-shadow:0 2px 8px rgba(0,0,0,0.15);
z-index:5000;
}

.topbar h1{
font-size:17px;
font-weight:500;
}

.topbar-right{
display:flex;
align-items:center;
gap:20px;
}

/* LOGO */

.logo-container{
display:flex;
align-items:center;
gap:20px;
}

.logo-circle{
width:48px;
height:48px;
background:white;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
padding:6px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
transition:transform .3s ease;
}

.logo-circle:hover{
transform:scale(1.05);
}

.logo-img{
width:100%;
height:100%;
object-fit:contain;
mix-blend-mode:multiply;
}

/* ===== AVATAR ===== */

.avatar-container{
position:relative;
cursor:pointer;
z-index:1500;
}

.avatar{
width:48px;
height:48px;
border-radius:50%;
background:var(--azul2);
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
font-size:16px;
color:white;
transition:.2s;
}

.avatar:hover{
transform:scale(1.05);
}

/* ===== DROPDOWN MODERNO ===== */

.dropdown{
position:absolute;
top:60px;
right:0;
background:white;
min-width:220px;
border-radius:12px;
box-shadow:0 12px 25px rgba(0,0,0,0.18);
padding:15px;
display:none;
opacity:0;
transform:translateY(-8px);
transition:all .25s ease;

z-index:2000;
}

/* cuando se abre */

.avatar-container.active .dropdown{
display:block;
opacity:1;
transform:translateY(0);
}

/* enlaces */

.dropdown a{
display:flex;
align-items:center;
justify-content:center;
gap:8px;
padding:10px;
margin:6px 0;
border-radius:8px;
text-decoration:none;
font-size:14px;
font-weight:500;
transition:.25s;
opacity:0;
transform:translateY(-5px);
}

/* animación escalonada */

.avatar-container.active .dropdown a{
opacity:1;
transform:translateY(0);
}

.avatar-container.active .dropdown a:nth-child(1){
transition-delay:.05s;
}

.avatar-container.active .dropdown a:nth-child(2){
transition-delay:.1s;
}

/* iconos */

.dropdown svg{
width:18px;
height:18px;
}

/* BOTON PERFIL */

.dropdown a:first-child{
background:#4a6fd1;
color:white;
}

.dropdown a:first-child:hover{
background:#3d5fc0;
}

/* BOTON LOGOUT */

.dropdown a:last-child{
background:#d93025;
color:white;
}

.dropdown a:last-child:hover{
background:#b4231a;
}

/* ===== BANNER RESPONSIVO ===== */

.menu-toggle {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 10px;
    z-index: 6000;
}

.menu-toggle span {
    width: 25px;
    height: 3px;
    background: white;
    border-radius: 3px;
    transition: 0.3s;
}

@media (max-width: 900px) {
    .menu-toggle {
        display: flex;
    }
    
    .topbar h1 {
        display: none; /* Ocultar título largo en móvil */
    }

    .logo-container h1 {
        display: none;
    }
    
    .topbar {
        padding: 0 10px;
    }
}

@media (max-width: 480px) {
    .logo-circle {
        width: 38px;
        height: 38px;
    }
    .avatar {
        width: 40px;
        height: 40px;
    }
}
</style>

<div class="topbar">
    <div class="menu-toggle" onclick="toggleSidebar()">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="logo-container">
        <div class="logo-circle">
            <img src="{% static 'img/logo.png' %}" alt="Logo" class="logo-img">
        </div>
        <h1>Programa de Incubación Empresarial</h1>
    </div>

    <div class="topbar-right">
        <div class="avatar-container" id="avatarMenu">
            <div class="avatar">
                {{ request.session.nombre|slice:":1"|upper }}
            </div>
            <div class="dropdown">
                <a href="{% url 'perfil_admin' %}">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 12c2.7 0 4.5-2.2 4.5-4.5S14.7 3 12 3 7.5 5.2 7.5 7.5 9.3 12 12 12zm0 2c-3.3 0-9 1.7-9 5v2h18v-2c0-3.3-5.7-5-9-5z"/>
                    </svg>
                    Ver perfil
                </a>
                <a href="#" onclick="abrirModalLogout(); return false;">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M16 17l5-5-5-5v3H9v4h7v3z"/>
                        <path d="M4 4h8v2H6v12h6v2H4z"/>
                    </svg>
                    Cerrar sesión
                </a>
            </div>
        </div>
    </div>
</div>

<div class="sidebar-overlay" onclick="toggleSidebar()"></div>

<script>
    function toggleSidebar() {
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.querySelector('.sidebar-overlay');
        const body = document.body;
        
        if (sidebar && overlay) {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            body.style.overflow = sidebar.classList.contains('active') ? 'hidden' : '';
        }
    }

    // Cerrar sidebar al hacer click fuera en móvil (ahora manejado por el overlay)
    // Pero dejamos un listener por si se redimensiona
    window.addEventListener('resize', function() {
        if (window.innerWidth > 900) {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.querySelector('.sidebar-overlay');
            if (sidebar) sidebar.classList.remove('active');
            if (overlay) overlay.classList.remove('active');
            document.body.style.overflow = '';
        }
    });
</script>

{% include "modals/modal_cerrar_sesion.html" %}
