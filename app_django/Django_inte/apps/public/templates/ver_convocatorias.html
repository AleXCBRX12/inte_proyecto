{% load static %}
<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="{% static 'css/ver_convocatorias.css' %}?v=18">

<div class="muro-container">
    <!-- Publications Showcase Grid -->
    <div class="showcase-grid" id="publicationsGrid">
        {% if muro %}
            {% for item in muro %}
                {% if item.tipo == 'convocatoria' %}
                    {% include "ver_convocatorias_item.html" with item=item %}
                {% endif %}
            {% endfor %}
        {% else %}
            <div class="no-posts">
                <i class="bi bi-inbox" style="font-size: 3rem; color: #cbd5e1; display: block; margin-bottom: 15px;"></i>
                <p>No hay convocatorias disponibles actualmente.</p>
            </div>
        {% endif %}
    </div>
</div>
