{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'css/loginn.css' %}">
    <title>Login</title>
</head>

<body>

    <!-- Canvas de partículas -->
    <canvas id="particles"></canvas>

    <a href="{% url 'portal_visitante_public' %}" class="btn_inicio_link">
        <i class="bi bi-arrow-left-short"></i> 
    </a>

    {% if mensaje %}
    <div class="error-container" style="background: rgba(16, 185, 129, 0.9) !important; box-shadow: 0 8px 20px rgba(0,0,0,0.25);">
        <p class="error-message" style="background:transparent !important; color:white !important; box-shadow:none !important;">
            <i class="bi bi-check-circle" style="font-size:1.2rem;"></i> {{ mensaje }}
        </p>
    </div>
    {% endif %}

    {% if error %}
    <div class="error-container">
        <p class="error-message">{{ error }}</p>
    </div>
    {% endif %}

    <!-- LOADER -->
    <div id="loader">
        <div class="spinner"></div>
        <div class="loader-text">Validando credenciales...</div>
    </div>

    <!-- Tarjeta de login -->
    <div class="login-card">

        <h2>Iniciar Sesión</h2>

        <form method="POST">
            {% csrf_token %}

            <input type="email" name="email" placeholder="Correo electrónico" required>
            <div class="password-container">
            <input type="password" name="password" placeholder="Contraseña" required>
            <span class="toggle-password" onclick="togglePassword()"><i class="bi bi-eye"></i></span>
            </div>
            <button type="submit">Ingresar</button>
            <a href="{% url 'solicitar_reset' %}">Recuperar contraseña</a>
            <a href="{% url 'aviso_privacidad' %}" style="display:block; margin-top:15px; font-size:0.85rem; opacity:0.7;">Aviso de Privacidad</a>
        </form>

    </div>

    
    <script src="{% static 'js/login_listo.js' %}"></script>
</body>

</html>
